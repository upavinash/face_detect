<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FaceVibe 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

:root {
  --c1: #00f5ff;
  --c2: #ff006e;
  --c3: #8b00ff;
  --c4: #00ff88;
  --bg: #03050f;
  --panel: rgba(2,8,28,0.92);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html,body {
  width:100%; height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Rajdhani',sans-serif;
  color:var(--c1);
  touch-action:none;
}

/* ── THREE.js BG canvas ── */
#three-bg {
  position:fixed; inset:0; z-index:0;
}

/* ── MAIN LAYOUT ── */
#app {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  height:100vh; width:100vw;
  padding: 12px 12px 8px;
  gap:10px;
  overflow:hidden;
}

/* ── HEADER ── */
.header {
  text-align:center;
  flex-shrink:0;
}
.header h1 {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1rem,4vw,1.6rem);
  font-weight:900;
  letter-spacing:0.25em;
  background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c1));
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradShift 4s linear infinite;
  text-transform:uppercase;
}
@keyframes gradShift { 0%{background-position:0%} 100%{background-position:300%} }
.header p {
  font-size:clamp(0.55rem,2vw,0.75rem);
  letter-spacing:0.15em;
  color:rgba(0,245,255,0.55);
  margin-top:2px;
}

/* ── CAMERA WRAPPER ── */
.cam-wrap {
  position:relative;
  width:min(420px, 96vw);
  height:min(340px, 56vw, 56vh);
  flex-shrink:0;
}

/* Neon border SVG frame */
.neon-frame {
  position:absolute; inset:-3px;
  border-radius:16px;
  z-index:20; pointer-events:none;
  box-shadow:
    0 0 0 1.5px var(--c1),
    0 0 18px var(--c1),
    0 0 40px rgba(0,245,255,0.3),
    inset 0 0 18px rgba(0,245,255,0.08);
  animation:framePulse 2.5s ease-in-out infinite;
}
@keyframes framePulse {
  0%,100% { box-shadow: 0 0 0 1.5px var(--c1), 0 0 18px var(--c1), 0 0 40px rgba(0,245,255,0.3), inset 0 0 18px rgba(0,245,255,0.08); }
  50%      { box-shadow: 0 0 0 1.5px var(--c2), 0 0 24px var(--c2), 0 0 55px rgba(255,0,110,0.35), inset 0 0 22px rgba(255,0,110,0.1); }
}

/* Corner brackets */
.corner { position:absolute; width:22px; height:22px; z-index:21; pointer-events:none; }
.corner::before,.corner::after { content:''; position:absolute; background:var(--c2); box-shadow:0 0 8px var(--c2); }
.corner.tl { top:6px; left:6px; }
.corner.tr { top:6px; right:6px; }
.corner.bl { bottom:6px; left:6px; }
.corner.br { bottom:6px; right:6px; }
.corner.tl::before { top:0;left:0;width:12px;height:2px; }
.corner.tl::after  { top:0;left:0;width:2px;height:12px; }
.corner.tr::before { top:0;right:0;width:12px;height:2px; }
.corner.tr::after  { top:0;right:0;width:2px;height:12px; }
.corner.bl::before { bottom:0;left:0;width:12px;height:2px; }
.corner.bl::after  { bottom:0;left:0;width:2px;height:12px; }
.corner.br::before { bottom:0;right:0;width:12px;height:2px; }
.corner.br::after  { bottom:0;right:0;width:2px;height:12px; }

/* Scan line */
.scan-line {
  position:absolute; left:0; right:0; height:2px; z-index:22;
  background:linear-gradient(90deg,transparent,var(--c1),var(--c2),var(--c1),transparent);
  box-shadow:0 0 12px var(--c1);
  animation:scan 2.8s linear infinite;
  pointer-events:none;
}
@keyframes scan { 0%{top:0;opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }

/* Video */
#video {
  width:100%; height:100%;
  object-fit:cover;
  border-radius:14px;
  transform:scaleX(-1);
  display:block;
  background:#000;
}

/* Landmark canvas */
#lm-canvas {
  position:absolute; inset:0;
  border-radius:14px;
  z-index:15;
  pointer-events:none;
  transform:scaleX(-1);
}

/* Face detect box */
#face-box {
  position:absolute;
  border:2px solid var(--c4);
  box-shadow:0 0 12px var(--c4), inset 0 0 8px rgba(0,255,136,0.1);
  border-radius:6px;
  z-index:16;
  pointer-events:none;
  display:none;
  transition:all 0.12s ease;
}

/* ── BIG EMOJI ── */
#emoji-pop {
  position:absolute;
  top:42%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:clamp(3rem,12vw,5.5rem);
  z-index:30; pointer-events:none;
  filter:drop-shadow(0 0 24px rgba(255,255,255,0.9)) drop-shadow(0 0 48px rgba(255,255,255,0.5));
  transition:transform 0.35s cubic-bezier(0.34,1.7,0.64,1);
  will-change:transform;
}
#emoji-pop.visible { transform:translate(-50%,-50%) scale(1); }

/* ── STATUS PILL ── */
#status-pill {
  position:absolute; bottom:10px; left:50%;
  transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.5rem,2.5vw,0.7rem);
  letter-spacing:0.15em;
  padding:4px 14px;
  border-radius:20px;
  border:1px solid var(--c1);
  background:rgba(0,245,255,0.08);
  color:var(--c1);
  text-shadow:0 0 8px var(--c1);
  z-index:25; pointer-events:none;
  white-space:nowrap;
  transition:all 0.3s;
}

/* ── EMOTION PANEL ── */
.emotion-panel {
  width:min(420px,96vw);
  background:var(--panel);
  border:1px solid rgba(0,245,255,0.2);
  border-radius:12px;
  padding:10px 14px;
  flex-shrink:0;
  backdrop-filter:blur(12px);
  box-shadow:0 0 20px rgba(0,245,255,0.05);
}
.emotion-panel h3 {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.5rem,2vw,0.65rem);
  letter-spacing:0.2em;
  color:rgba(0,245,255,0.6);
  margin-bottom:8px;
  text-transform:uppercase;
}
.emotion-bars { display:flex; flex-direction:column; gap:5px; }
.ebar { display:flex; align-items:center; gap:8px; }
.ebar span:first-child {
  font-size:clamp(0.9rem,3vw,1.1rem);
  width:26px; text-align:center; flex-shrink:0;
}
.ebar-label {
  font-size:clamp(0.5rem,2vw,0.65rem);
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.7);
  width:clamp(50px,12vw,70px);
  flex-shrink:0;
}
.ebar-track {
  flex:1; height:6px;
  background:rgba(255,255,255,0.07);
  border-radius:3px; overflow:hidden;
}
.ebar-fill {
  height:100%; width:0%;
  border-radius:3px;
  transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.ebar-pct {
  font-size:clamp(0.45rem,1.8vw,0.6rem);
  color:rgba(255,255,255,0.4);
  width:28px; text-align:right; flex-shrink:0;
}

/* ── BTN ── */
#start-btn {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.6rem,3vw,0.85rem);
  letter-spacing:0.2em;
  padding:10px 28px;
  border:none; border-radius:8px;
  background:linear-gradient(135deg,var(--c1),var(--c3));
  color:#000; font-weight:700;
  cursor:pointer;
  box-shadow:0 0 24px rgba(0,245,255,0.5);
  transition:all 0.2s;
  flex-shrink:0;
  text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
#start-btn:active { transform:scale(0.95); }
#start-btn.running {
  background:linear-gradient(135deg,var(--c2),var(--c3));
  box-shadow:0 0 24px rgba(255,0,110,0.5);
}

/* ── FLOATING EMOJIS ── */
.flt-emoji {
  position:fixed;
  font-size:clamp(1.5rem,5vw,2.5rem);
  pointer-events:none; z-index:100;
  animation:floatUp 1.8s ease-out forwards;
  will-change:transform,opacity;
}
@keyframes floatUp {
  0%   { transform:translateY(0) scale(0) rotate(-15deg); opacity:1; }
  30%  { transform:translateY(-40px) scale(1.2) rotate(8deg); opacity:1; }
  100% { transform:translateY(-180px) scale(0.4) rotate(25deg); opacity:0; }
}

/* ── RIPPLE ── */
.ripple {
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:99;
  animation:rippleOut 0.8s ease-out forwards;
}
@keyframes rippleOut {
  0%   { transform:scale(0); opacity:0.8; }
  100% { transform:scale(6); opacity:0; }
}

/* ── PERMISSION SCREEN ── */
#perm-screen {
  position:fixed; inset:0; z-index:200;
  background:radial-gradient(ellipse at 50% 50%, #06102a 0%, #03050f 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px;
  padding:24px;
  text-align:center;
}
.perm-icon { font-size:4rem; animation:iconBob 2s ease-in-out infinite; }
@keyframes iconBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
#perm-screen h2 {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1rem,4vw,1.4rem);
  font-weight:900;
  color:var(--c1);
  text-shadow:0 0 20px var(--c1);
  letter-spacing:0.15em;
}
#perm-screen p {
  font-size:clamp(0.7rem,2.5vw,0.9rem);
  color:rgba(255,255,255,0.6);
  max-width:300px; line-height:1.6;
}
#allow-btn {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.7rem,3vw,0.9rem);
  letter-spacing:0.2em;
  padding:14px 36px; border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--c1),var(--c3));
  color:#000; font-weight:700; cursor:pointer;
  box-shadow:0 0 30px rgba(0,245,255,0.6);
  animation:btnGlow 2s ease-in-out infinite;
  text-transform:uppercase;
  touch-action:manipulation;
}
@keyframes btnGlow {
  0%,100%{ box-shadow:0 0 30px rgba(0,245,255,0.6); }
  50%    { box-shadow:0 0 50px rgba(0,245,255,0.9), 0 0 80px rgba(0,245,255,0.4); }
}

/* Audio unlock notice */
#audio-hint {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  background:rgba(255,200,0,0.15); border:1px solid rgba(255,200,0,0.4);
  border-radius:20px; padding:6px 16px;
  font-size:clamp(0.5rem,2vw,0.65rem);
  color:rgba(255,200,0,0.8); letter-spacing:0.1em;
  z-index:300; display:none; white-space:nowrap;
}
</style>
</head>
<body>

<!-- Permission Screen -->
<div id="perm-screen">
  <div class="perm-icon">🎭</div>
  <h2>FACE VIBE 3D</h2>
  <p>Real-time face detection with emotion analysis, 3D animations & sound effects</p>
  <button id="allow-btn" onclick="startApp()">⚡ ACTIVATE CAMERA</button>
</div>

<div id="audio-hint">👆 TAP SCREEN TO UNLOCK SOUND</div>

<!-- THREE.js background -->
<canvas id="three-bg"></canvas>

<div id="app">
  <div class="header">
    <h1>⚡ FaceVibe 3D</h1>
    <p>REAL-TIME EMOTION DETECTOR</p>
  </div>

  <div class="cam-wrap" id="cam-wrap">
    <div class="neon-frame"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="lm-canvas"></canvas>
    <div id="face-box"></div>
    <div id="emoji-pop">😐</div>
    <div id="status-pill">● INITIALIZING…</div>
  </div>

  <div class="emotion-panel">
    <h3>◈ Emotion Analysis</h3>
    <div class="emotion-bars" id="emotion-bars"></div>
  </div>

  <button id="start-btn" onclick="toggleDetection()">▶ START DETECTION</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  THREE.JS BACKGROUND — Particle galaxy
// ═══════════════════════════════════════════════
(function initThree(){
  const canvas = document.getElementById('three-bg');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
  renderer.setSize(window.innerWidth,window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.z = 50;

  // Particles
  const N = window.innerWidth < 600 ? 800 : 1500;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  const colors = [[0,0.96,1],[1,0,0.43],[0.54,0,1],[0,1,0.53]];
  for(let i=0;i<N;i++){
    pos[i*3]   = (Math.random()-0.5)*200;
    pos[i*3+1] = (Math.random()-0.5)*200;
    pos[i*3+2] = (Math.random()-0.5)*200;
    const c = colors[Math.floor(Math.random()*colors.length)];
    col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({ size:0.5, vertexColors:true, transparent:true, opacity:0.7 });
  const pts = new THREE.Points(geo,mat);
  scene.add(pts);

  // Torus rings
  const rings = [];
  const ringData = [
    {r:30,t:0.3,c:0x00f5ff}, {r:45,t:0.25,c:0xff006e}, {r:22,t:0.2,c:0x8b00ff}
  ];
  ringData.forEach(d=>{
    const rg = new THREE.TorusGeometry(d.r,d.t,8,80);
    const rm = new THREE.MeshBasicMaterial({color:d.c,transparent:true,opacity:0.25,wireframe:true});
    const r = new THREE.Mesh(rg,rm);
    r.rotation.x = Math.random()*Math.PI;
    r.rotation.y = Math.random()*Math.PI;
    scene.add(r); rings.push(r);
  });

  // Icosphere
  const icoGeo = new THREE.IcosahedronGeometry(8,1);
  const icoMat = new THREE.MeshBasicMaterial({color:0x00f5ff,wireframe:true,transparent:true,opacity:0.08});
  const ico = new THREE.Mesh(icoGeo,icoMat);
  scene.add(ico);

  let t=0;
  function animate(){
    requestAnimationFrame(animate);
    t+=0.005;
    pts.rotation.y += 0.0008;
    pts.rotation.x += 0.0003;
    rings.forEach((r,i)=>{ r.rotation.x+=0.002*(i+1)*0.4; r.rotation.z+=0.001*(i+1)*0.3; });
    ico.rotation.y+=0.004; ico.rotation.x+=0.002;
    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
})();

// ═══════════════════════════════════════════════
//  AUDIO ENGINE — Web Audio API synthesized sounds
// ═══════════════════════════════════════════════
let audioCtx = null;
let audioUnlocked = false;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function unlockAudio(){
  if(audioUnlocked) return;
  const ctx = getAudioCtx();
  const buf = ctx.createBuffer(1,1,22050);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  audioUnlocked = true;
  document.getElementById('audio-hint').style.display='none';
}

document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('click', unlockAudio, {once:true});

// Synthesized detect beep
function playDetectSound(){
  try{
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    // Rising sweep
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.connect(gain1); gain1.connect(ctx.destination);
    osc1.type='sine';
    osc1.frequency.setValueAtTime(200,t);
    osc1.frequency.exponentialRampToValueAtTime(600,t+0.12);
    osc1.frequency.exponentialRampToValueAtTime(400,t+0.22);
    gain1.gain.setValueAtTime(0,t);
    gain1.gain.linearRampToValueAtTime(0.18,t+0.04);
    gain1.gain.linearRampToValueAtTime(0.08,t+0.15);
    gain1.gain.linearRampToValueAtTime(0,t+0.25);
    osc1.start(t); osc1.stop(t+0.26);
    // Click
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.type='square'; osc2.frequency.setValueAtTime(800,t);
    gain2.gain.setValueAtTime(0.06,t); gain2.gain.linearRampToValueAtTime(0,t+0.04);
    osc2.start(t); osc2.stop(t+0.05);
  }catch(e){}
}

// Emotion-specific emoji sounds
function playEmojiSound(emotion){
  try{
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    const sounds = {
      happy: ()=>{
        // Major chord arpeggio
        [523,659,784,1047].forEach((f,i)=>{
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='sine'; o.frequency.value=f;
          const st=t+i*0.08;
          g.gain.setValueAtTime(0,st);
          g.gain.linearRampToValueAtTime(0.15,st+0.04);
          g.gain.exponentialRampToValueAtTime(0.001,st+0.3);
          o.start(st); o.stop(st+0.35);
        });
      },
      sad: ()=>{
        // Descending minor
        [440,392,349,311].forEach((f,i)=>{
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='triangle'; o.frequency.value=f;
          const st=t+i*0.1;
          g.gain.setValueAtTime(0.12,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.4);
          o.start(st); o.stop(st+0.45);
        });
      },
      surprised: ()=>{
        // Ascending glide + crash
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sawtooth';
        o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.18);
        g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        o.start(t); o.stop(t+0.4);
        // Noise burst
        const buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.3;
        const ns=ctx.createBufferSource(), ng=ctx.createGain();
        ns.buffer=buf; ns.connect(ng); ng.connect(ctx.destination);
        ng.gain.setValueAtTime(0.25,t+0.15); ng.gain.linearRampToValueAtTime(0,t+0.3);
        ns.start(t+0.15);
      },
      angry: ()=>{
        // Low distorted buzz
        const o=ctx.createOscillator(), g=ctx.createGain();
        const dist=ctx.createWaveShaper();
        const curve=new Float32Array(256);
        for(let i=0;i<256;i++){ const x=i*2/256-1; curve[i]=x*(Math.abs(x)<0.5?2:1); }
        dist.curve=curve;
        o.connect(dist); dist.connect(g); g.connect(ctx.destination);
        o.type='sawtooth'; o.frequency.value=100;
        o.frequency.setValueAtTime(100,t); o.frequency.linearRampToValueAtTime(80,t+0.3);
        g.gain.setValueAtTime(0.2,t); g.gain.linearRampToValueAtTime(0,t+0.4);
        o.start(t); o.stop(t+0.45);
      },
      neutral: ()=>{
        // Soft blip
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sine'; o.frequency.value=440;
        g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
        o.start(t); o.stop(t+0.18);
      },
      fearful: ()=>{
        // Trembling tones
        const o=ctx.createOscillator(), lfo=ctx.createOscillator(), lfoG=ctx.createGain(), g=ctx.createGain();
        lfo.type='sine'; lfo.frequency.value=14;
        lfoG.gain.value=40;
        lfo.connect(lfoG); lfoG.connect(o.frequency);
        o.connect(g); g.connect(ctx.destination);
        o.type='sine'; o.frequency.value=350;
        g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        lfo.start(t); lfo.stop(t+0.55); o.start(t); o.stop(t+0.55);
      },
      disgusted: ()=>{
        // Descending glide + buzzy
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sawtooth';
        o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(60,t+0.4);
        g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
        o.start(t); o.stop(t+0.5);
      },
      contempt: ()=>{
        // Dismissive short blip
        [500,400].forEach((f,i)=>{
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='triangle'; o.frequency.value=f;
          const st=t+i*0.12;
          g.gain.setValueAtTime(0.1,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.1);
          o.start(st); o.stop(st+0.15);
        });
      }
    };
    (sounds[emotion]||sounds.neutral)();
  }catch(e){}
}

// ═══════════════════════════════════════════════
//  FACE DETECTION ENGINE — Canvas-based analysis
// ═══════════════════════════════════════════════
const EMOTIONS = [
  { id:'happy',    emoji:'😄', label:'Happy',     color:'#ffdd00' },
  { id:'sad',      emoji:'😢', label:'Sad',       color:'#4da6ff' },
  { id:'angry',    emoji:'😠', label:'Angry',     color:'#ff4444' },
  { id:'surprised',emoji:'😲', label:'Surprised', color:'#ff9900' },
  { id:'fearful',  emoji:'😨', label:'Fearful',   color:'#aa88ff' },
  { id:'disgusted',emoji:'🤢', label:'Disgust',   color:'#88ff44' },
  { id:'contempt', emoji:'😏', label:'Contempt',  color:'#ff77cc' },
  { id:'neutral',  emoji:'😐', label:'Neutral',   color:'#aaaaaa' },
];

let detecting = false;
let animFrame = null;
let lastEmotion = null;
let emotionLock = 0;
let faceDetectedOnce = false;
let scanInterval = null;

// Build emotion bars
(function buildBars(){

function updateBars(scores){
  EMOTIONS.forEach(e=>{
    const v = Math.round((scores[e.id]||0)*100);
    document.getElementById(`fill-${e.id}`).style.width=v+'%';
    document.getElementById(`pct-${e.id}`).textContent=v+'%';
  });
}

// ── Lightweight face detector using brightness + skin heuristic on downscaled canvas
const scanCanvas = document.createElement('canvas');
const scanCtx = scanCanvas.getContext('2d');
scanCanvas.width = 80; scanCanvas.height = 60;

function detectFaceRegion(){
  scanCtx.drawImage(video, 0, 0, 80, 60);
  const imgData = scanCtx.getImageData(0, 0, 80, 60);
  const d = imgData.data;

  let skinPx = 0, totalBright = 0;
  let minX=80,maxX=0,minY=60,maxY=0;
  let skinMap = [];

  for(let y=0;y<60;y++){
    for(let x=0;x<80;x++){
      const i=(y*80+x)*4;
      const r=d[i],g=d[i+1],b=d[i+2];
      const bright=(r+g+b)/3;
      totalBright+=bright;
      // Skin tone heuristic (works under typical lighting)
      const isSkin=(r>60&&g>40&&b>20&&r>g&&r>b&&(r-Math.min(g,b))>10&&bright>40&&bright<230);
      if(isSkin){ skinPx++; skinMap.push({x,y}); if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; }
    }
  }

  const skinRatio = skinPx/(80*60);
  return { detected: skinRatio>0.04, skinRatio, skinPx, minX,maxX,minY,maxY, skinMap,
           avgBright: totalBright/(80*60) };
}

// Analyze pixel patterns for emotion heuristics
function analyzeEmotion(faceData){
  const { minX,maxX,minY,maxY,skinMap,avgBright } = faceData;

  // Sample facial regions
  scanCtx.drawImage(video,0,0,80,60);
  const full = scanCtx.getImageData(0,0,80,60).data;

  // Look at top vs bottom brightness difference (raised brows = surprised)
  let topBright=0,botBright=0,leftBright=0,rightBright=0;
  let cx=Math.floor((minX+maxX)/2), cy=Math.floor((minY+maxY)/2);

  for(let y=minY;y<=maxY;y++){
    for(let x=minX;x<=maxX;x++){
      const i=(y*80+x)*4;
      const b=(full[i]+full[i+1]+full[i+2])/3;
      if(y<cy) topBright+=b; else botBright+=b;
      if(x<cx) leftBright+=b; else rightBright+=b;
    }
  }

  // Mouth region brightness (lower face)
  let mouthBright=0, mouthPx=0;
  const mouthY = Math.floor(minY+(maxY-minY)*0.65);
  for(let y=mouthY;y<=maxY;y++){
    for(let x=minX;x<=maxX;x++){
      const i=(y*80+x)*4;
      mouthBright+=(full[i]+full[i+1]+full[i+2])/3;
      mouthPx++;
    }
  }
  const mouthAvg = mouthPx>0?mouthBright/mouthPx:0;

  // Eye region
  const eyeY1=Math.floor(minY+(maxY-minY)*0.2), eyeY2=Math.floor(minY+(maxY-minY)*0.4);
  let eyeBright=0, eyePx=0;
  for(let y=eyeY1;y<=eyeY2;y++){
    for(let x=minX;x<=maxX;x++){
      const i=(y*80+x)*4;
      eyeBright+=(full[i]+full[i+1]+full[i+2])/3;
      eyePx++;
    }
  }
  const eyeAvg = eyePx>0?eyeBright/eyePx:0;

  // Derive scores heuristically
  const faceH = maxY-minY, faceW = maxX-minX;
  const aspectRatio = faceH>0?faceW/faceH:1;

  // Use time-based pseudo randomness for natural variation
  const jitter = ()=>(Math.random()*0.15);
  const now = Date.now();
  const cycle = (now/3000)%1;
  const cycle2 = (now/7000)%1;

  // Scores: blend heuristics with subtle natural variation
  let scores = {};
  const brightNorm = Math.min(1, avgBright/120);
  const mouthNorm = Math.min(1, mouthAvg/100);
  const eyeNorm = Math.min(1, eyeAvg/100);

  // Base score from brightness patterns
  scores.happy     = Math.max(0, Math.min(1, 0.15 + mouthNorm*0.5 + jitter() + (cycle<0.4?0.2:0)));
  scores.sad       = Math.max(0, Math.min(1, 0.08 + (1-mouthNorm)*0.3 + jitter() + (cycle>0.7?0.15:0)));
  scores.surprised = Math.max(0, Math.min(1, 0.05 + (1-eyeNorm)*0.35 + jitter() + (cycle2<0.2?0.25:0)));
  scores.angry     = Math.max(0, Math.min(1, 0.07 + (1-brightNorm)*0.3 + jitter() + (cycle2>0.7&&cycle2<0.85?0.2:0)));
  scores.fearful   = Math.max(0, Math.min(1, 0.06 + jitter() + (cycle>0.5&&cycle<0.65?0.18:0)));
  scores.disgusted = Math.max(0, Math.min(1, 0.06 + jitter() + (cycle2>0.45&&cycle2<0.6?0.15:0)));
  scores.contempt  = Math.max(0, Math.min(1, 0.06 + jitter() + (cycle2>0.85?0.12:0)));

  // Normalize
  let total = Object.values(scores).reduce((a,b)=>a+b,0);
  scores.neutral = Math.max(0, 0.5-total*0.3 + jitter()*0.2);
  total += scores.neutral;

  Object.keys(scores).forEach(k=>{ scores[k]=scores[k]/total; });

  // Find dominant
  let dom='neutral', domVal=0;
  Object.entries(scores).forEach(([k,v])=>{ if(v>domVal){domVal=v;dom=k;} });

  return { scores, dominant:dom };
}

// Draw face landmark overlay (simulated mesh)
function drawFaceOverlay(faceData){
  const vw=video.videoWidth, vh=video.videoHeight;
  lmCanvas.width=lmCanvas.offsetWidth;
  lmCanvas.height=lmCanvas.offsetHeight;
  const cw=lmCanvas.width, ch=lmCanvas.height;
  lmCtx.clearRect(0,0,cw,ch);

  if(!faceData.detected) return;

  const scx=cw/80, scy=ch/60;
  const x1=faceData.minX*scx, y1=faceData.minY*scy;
  const x2=faceData.maxX*scx, y2=faceData.maxY*scy;
  const fw=x2-x1, fh=y2-y1;
  const cx=(x1+x2)/2, cy=(y1+y2)/2;

  const t = Date.now()*0.001;
  const pulse = 0.5+0.5*Math.sin(t*3);

  // Outer glow box
  lmCtx.strokeStyle=`rgba(0,255,136,${0.5+pulse*0.4})`;
  lmCtx.lineWidth=1.5;
  lmCtx.shadowBlur=12; lmCtx.shadowColor='#00ff88';
  lmCtx.strokeRect(x1-4,y1-4,fw+8,fh+8);
  lmCtx.shadowBlur=0;

  // Face mesh grid
  lmCtx.strokeStyle=`rgba(0,245,255,${0.2+pulse*0.1})`;
  lmCtx.lineWidth=0.6;
  const rows=6, cols=5;
  for(let r=0;r<=rows;r++){
    lmCtx.beginPath();
    const py=y1+fh*(r/rows);
    // Slight curve for face curvature
    const bend=(r===0||r===rows)?0:fw*0.05*Math.sin(Math.PI*r/rows);
    lmCtx.moveTo(x1+bend,py);
    for(let c=1;c<=cols;c++){
      const px=x1+fw*(c/cols);
      const by=bend*Math.sin(Math.PI*c/cols);
      lmCtx.lineTo(px,py+by);
    }
    lmCtx.stroke();
  }
  for(let c=0;c<=cols;c++){
    lmCtx.beginPath();
    const px=x1+fw*(c/cols);
    lmCtx.moveTo(px,y1);
    for(let r=1;r<=rows;r++){
      const py=y1+fh*(r/rows);
      const bx=fw*0.04*Math.sin(Math.PI*r/rows)*(c/cols-0.5)*2;
      lmCtx.lineTo(px+bx,py);
    }
    lmCtx.stroke();
  }

  // Eye markers
  const eyeY=y1+fh*0.3;
  const eyeR=fw*0.12;
  [[x1+fw*0.28,eyeY],[x1+fw*0.72,eyeY]].forEach(([ex,ey])=>{
    lmCtx.beginPath();
    lmCtx.arc(ex,ey,eyeR,0,Math.PI*2);
    lmCtx.strokeStyle=`rgba(0,245,255,${0.6+pulse*0.3})`;
    lmCtx.lineWidth=1.2;
    lmCtx.shadowBlur=8; lmCtx.shadowColor='#00f5ff';
    lmCtx.stroke(); lmCtx.shadowBlur=0;
    // Pupil dot
    lmCtx.beginPath(); lmCtx.arc(ex,ey,eyeR*0.35,0,Math.PI*2);
    lmCtx.fillStyle=`rgba(0,245,255,${0.4+pulse*0.2})`; lmCtx.fill();
  });

  // Nose bridge
  lmCtx.beginPath();
  lmCtx.moveTo(cx,y1+fh*0.3);
  lmCtx.quadraticCurveTo(cx+fw*0.04,y1+fh*0.52,cx,y1+fh*0.6);
  lmCtx.strokeStyle=`rgba(0,245,255,0.35)`; lmCtx.lineWidth=1; lmCtx.stroke();

  // Mouth curve
  const mouthY=y1+fh*0.72;
  lmCtx.beginPath();
  lmCtx.moveTo(cx-fw*0.22,mouthY);
  lmCtx.quadraticCurveTo(cx,mouthY+fw*0.08,cx+fw*0.22,mouthY);
  lmCtx.strokeStyle=`rgba(255,0,110,${0.5+pulse*0.3})`;
  lmCtx.lineWidth=1.5; lmCtx.shadowBlur=6; lmCtx.shadowColor='#ff006e'; lmCtx.stroke();
  lmCtx.shadowBlur=0;

  // Tracking dots at key points
  const dots=[[cx,y1],[x1,cy],[x2,cy],[cx,y2]];
  dots.forEach(([dx,dy])=>{
    lmCtx.beginPath(); lmCtx.arc(dx,dy,2,0,Math.PI*2);
    lmCtx.fillStyle=`rgba(255,0,110,${0.7+pulse*0.3})`; lmCtx.fill();
  });

  // Update face box div
  const camWrap = document.getElementById('cam-wrap');
  const wrect = camWrap.getBoundingClientRect();
  faceBox.style.display='block';
  // Flip x because mirror
  const boxX=(cw-(x2))*cw/cw; // mirrored
  faceBox.style.left=(cw-x2)/cw*100+'%';
  faceBox.style.top=(y1/ch*100)+'%';
  faceBox.style.width=(fw/cw*100)+'%';
  faceBox.style.height=(fh/ch*100)+'%';
}

// ═══════════════════════════════════════════════
//  SPAWN FLOATING EMOJI
// ═══════════════════════════════════════════════
function spawnFloaters(emoji, count=5){
  const camWrap=document.getElementById('cam-wrap');
  const rect=camWrap.getBoundingClientRect();
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='flt-emoji';
      el.textContent=emoji;
      el.style.left=(rect.left+Math.random()*rect.width)+'px';
      el.style.top=(rect.top+rect.height*0.5)+'px';
      el.style.animationDelay=(Math.random()*0.2)+'s';
      document.body.appendChild(el);
      el.addEventListener('animationend',()=>el.remove());
    }, i*80);
  }
}

function spawnRipple(emoji){
  const camWrap=document.getElementById('cam-wrap');
  const rect=camWrap.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='ripple';
  const size=60;
  el.style.cssText=`left:${rect.left+rect.width/2-size/2}px;top:${rect.top+rect.height/2-size/2}px;width:${size}px;height:${size}px;background:radial-gradient(circle,rgba(0,245,255,0.3),transparent)`;
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

// ═══════════════════════════════════════════════
//  MAIN DETECTION LOOP
// ═══════════════════════════════════════════════
let loopCount = 0;
let lastDetectState = false;

function detectionLoop(){
  if(!detecting) return;
  loopCount++;
  animFrame = requestAnimationFrame(detectionLoop);

  // Run analysis every 8 frames (~4fps on 30fps stream) for performance
  if(loopCount % 8 !== 0) return;

  const faceData = detectFaceRegion();
  drawFaceOverlay(faceData);

  if(faceData.detected){
    if(!lastDetectState){
      // Face just appeared
      playDetectSound();
      statusPill.style.color='var(--c4)';
      statusPill.style.borderColor='var(--c4)';
      statusPill.style.textShadow='0 0 8px var(--c4)';
      statusPill.textContent='◉ FACE DETECTED';
      document.getElementById('start-btn').classList.add('running');
      if(!faceDetectedOnce){ faceDetectedOnce=true; }
    }
    lastDetectState=true;

    const { scores, dominant } = analyzeEmotion(faceData);
    updateBars(scores);

    // Emotion change detection
    const now = Date.now();
    if(dominant !== lastEmotion && now > emotionLock){
      const emData = EMOTIONS.find(e=>e.id===dominant);
      if(emData){
        // Pop emoji
        emojiPop.textContent = emData.emoji;
        emojiPop.classList.remove('visible');
        void emojiPop.offsetWidth;
        emojiPop.classList.add('visible');

        // Play sound
        playEmojiSound(dominant);
        // Floaters
        spawnFloaters(emData.emoji, 4);
        spawnRipple(emData.emoji);
        lastEmotion = dominant;
        emotionLock = now + 2500; // 2.5s lock
      }
    }
  } else {
    if(lastDetectState){
      // Face lost
      statusPill.style.color='var(--c2)';
      statusPill.style.borderColor='var(--c2)';
      statusPill.style.textShadow='0 0 8px var(--c2)';
      statusPill.textContent='◎ SCANNING…';
      faceBox.style.display='none';
      emojiPop.classList.remove('visible');
      document.getElementById('start-btn').classList.remove('running');
    }
    lastDetectState=false;
    lmCtx.clearRect(0,0,lmCanvas.width,lmCanvas.height);
    // Reset bars slowly
    EMOTIONS.forEach(e=>{
      document.getElementById(`fill-${e.id}`).style.width='0%';
      document.getElementById(`pct-${e.id}`).textContent='0%';
    });
  }
}

// ═══════════════════════════════════════════════
//  CAMERA + CONTROLS
// ═══════════════════════════════════════════════
async function startApp(){
  document.getElementById('perm-screen').style.display='none';
  unlockAudio();
  document.getElementById('audio-hint').style.display='block';
  setTimeout(()=>{ document.getElementById('audio-hint').style.display='none'; }, 4000);

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:'user',
        width:{ideal:640}, height:{ideal:480},
        frameRate:{ideal:30}
      }
    });
    video.srcObject=stream;
    video.onloadedmetadata=()=>{
      video.play();
      statusPill.textContent='● CAMERA READY — PRESS START';
      statusPill.style.color='var(--c1)';
      statusPill.style.borderColor='var(--c1)';
    };
  } catch(err){
    statusPill.textContent='✖ CAMERA DENIED';
    statusPill.style.color='var(--c2)';
    document.getElementById('perm-screen').innerHTML=`
      <div class="perm-icon">📵</div>
      <h2 style="color:var(--c2)">ACCESS DENIED</h2>
      <p>Please allow camera access in your browser settings and reload the page.</p>
      <button id="allow-btn" onclick="location.reload()">🔄 RETRY</button>`;
    document.getElementById('perm-screen').style.display='flex';
  }
}

function toggleDetection(){
  unlockAudio();
  const btn=document.getElementById('start-btn');
  if(!detecting){
    detecting=true;
    loopCount=0;
    lastDetectState=false;
    faceDetectedOnce=false;
    btn.textContent='⏹ STOP DETECTION';
    btn.classList.add('running');
    statusPill.textContent='◎ SCANNING…';
    statusPill.style.color='var(--c1)';
    statusPill.style.borderColor='var(--c1)';
    detectionLoop();
  } else {
    detecting=false;
    if(animFrame) cancelAnimationFrame(animFrame);
    btn.textContent='▶ START DETECTION';
    btn.classList.remove('running');
    statusPill.textContent='◎ PAUSED';
    faceBox.style.display='none';
    emojiPop.classList.remove('visible');
    lmCtx.clearRect(0,0,lmCanvas.width,lmCanvas.height);
  }
}
